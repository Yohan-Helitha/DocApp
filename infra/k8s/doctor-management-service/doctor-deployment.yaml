apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-management-service
  labels:
    app: doctor-management-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctor-management-service
  template:
    metadata:
      labels:
        app: doctor-management-service
    spec:
      initContainers:
        - name: seed-verified-doctor
          image: docapp/doctor-management-service:local
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: "production"
            - name: PGHOST
              value: "doctors-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: doctor-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: doctor-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: doctor-db-secret
                  key: PGPASSWORD
          command: ["node", "seed-verified-doctor.js"]
      containers:
        - name: doctor-management-service
          image: docapp/doctor-management-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4002
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4002"
            - name: PGHOST
              value: "doctors-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: doctor-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: doctor-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: doctor-db-secret
                  key: PGPASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: doctor-db-secret
                  key: JWT_SECRET
            - name: AUTH_PUBLIC_KEY_PATH
              value: "/app/keys/auth-public.pem"
          volumeMounts:
            - name: auth-public-key
              mountPath: /app/keys
              readOnly: true
      volumes:
        - name: auth-public-key
          secret:
            secretName: auth-public-key
            items:
              - key: public.pem
                path: auth-public.pem

---
apiVersion: v1
kind: Service
metadata:
  name: doctor-management-service
spec:
  type: LoadBalancer
  selector:
    app: doctor-management-service
  ports:
    - protocol: TCP
      port: 4002
      targetPort: 4002
