apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-management-service
  labels:
    app: admin-management-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-management-service
  template:
    metadata:
      labels:
        app: admin-management-service
    spec:
      initContainers:
        - name: init-admin-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: "admin-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: admin-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: admin-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: admin-db-secret
                  key: PGPASSWORD
          volumeMounts:
            - name: admin-db-init
              mountPath: /init/init.sql
              subPath: init.sql
              readOnly: true
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for Postgres at ${PGHOST}:${PGPORT}..."
              until pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}"; do
                echo "Postgres not ready yet; retrying..."
                sleep 2
              done
              echo "Applying admin schema..."
              psql -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}" -v ON_ERROR_STOP=1 -f /init/init.sql
      containers:
        - name: admin-management-service
          image: docapp/admin-management-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4008
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4008"
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@admin-postgres:5432/admindb"
            - name: PGHOST
              value: "admin-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: admin-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: admin-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: admin-db-secret
                  key: PGPASSWORD
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: internal-api-secret
                  key: INTERNAL_API_KEY
            - name: AUTH_PUBLIC_KEY_PATH
              value: "/app/keys/auth-public.pem"
          volumeMounts:
            - name: auth-public-key
              mountPath: /app/keys/auth-public.pem
              subPath: auth-public.pem
              readOnly: true
      volumes:
        - name: auth-public-key
          secret:
            secretName: auth-public-key
            items:
              - key: public.pem
                path: auth-public.pem
        - name: admin-db-init
          configMap:
            name: admin-db-init
            items:
              - key: init.sql
                path: init.sql
---
apiVersion: v1
kind: Service
metadata:
  name: admin-management-service
spec:
  type: ClusterIP
  selector:
    app: admin-management-service
  ports:
    - protocol: TCP
      port: 4008
      targetPort: 4008
