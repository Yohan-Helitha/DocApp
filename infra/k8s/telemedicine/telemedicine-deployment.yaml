apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine
  labels:
    app: telemedicine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemedicine
  template:
    metadata:
      labels:
        app: telemedicine
    spec:
      containers:
      - name: telemedicine
        image: docapp/telemedicine-service:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4010
        env:
        - name: NODE_ENV
          value: "production"
        - name: APP_TIMEZONE
          value: "Asia/Colombo"
        - name: PORT
          value: "4010"
        - name: PGHOST
          value: "auth-postgres"
        - name: PGPORT
          value: "5432"
        - name: PGDATABASE
          value: "telemeddb"
        - name: PGUSER
          valueFrom:
            configMapKeyRef:
              name: auth-db-config
              key: PGUSER
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: auth-db-secret
              key: PGPASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: auth-db-secret
              key: JWT_SECRET
        - name: AUTH_PUBLIC_KEY_PATH
          value: "/keys/public.pem"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:6000"
        volumeMounts:
        - name: auth-public-key
          mountPath: /keys
          readOnly: true

      volumes:
      - name: auth-public-key
        secret:
          secretName: auth-public-key

---
apiVersion: v1
kind: Service
metadata:
  name: telemedicine
spec:
  selector:
    app: telemedicine
  ports:
  - protocol: TCP
    port: 4010
    targetPort: 4010
  type: ClusterIP
