apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointments-postgres
  labels:
    app: appointments-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointments-postgres
  template:
    metadata:
      labels:
        app: appointments-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: appointment-db-config
                  key: PGUSER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: appointment-db-config
                  key: PGDATABASE
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: appointment-db-secret
                  key: PGPASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: appointments-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: appointments-postgres
spec:
  type: LoadBalancer
  selector:
    app: appointments-postgres
  ports:
    - protocol: TCP
      port: 5434
      targetPort: 5432

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: appointments-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
