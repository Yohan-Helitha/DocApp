apiVersion: batch/v1
kind: Job
metadata:
  name: doctor-db-seed
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: "doctors-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: doctor-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: doctor-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: doctor-db-secret
                  key: PGPASSWORD
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for Postgres at ${PGHOST}:${PGPORT}..."
              until pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}"; do
                echo "Postgres not ready yet; retrying..."
                sleep 2
              done
              echo "Applying doctor schema + seed..."
              psql -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}" -f /seed/seed.sql
              echo "Done."
          volumeMounts:
            - name: seed-sql
              mountPath: /seed
      volumes:
        - name: seed-sql
          configMap:
            name: doctor-db-seed
            items:
              - key: seed.sql
                path: seed.sql
