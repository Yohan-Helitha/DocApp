apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-management-service
  labels:
    app: doctor-management-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctor-management-service
  template:
    metadata:
      labels:
        app: doctor-management-service
    spec:
      initContainers:
        - name: init-doctor-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: "doctors-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: doctor-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: doctor-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: doctor-db-secret
                  key: PGPASSWORD
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for Postgres at ${PGHOST}:${PGPORT}..."
              until pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}"; do
                echo "Postgres not ready yet; retrying..."
                sleep 2
              done
              echo "Applying doctor schema..."
              psql -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}" -f /db-init/init.sql
              echo "Doctor schema applied."
          volumeMounts:
            - name: doctor-db-init
              mountPath: /db-init
        - name: seed-verified-doctor
          image: docapp/doctor-management-service:local
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: "production"
            - name: PGHOST
              value: "doctors-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: doctor-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: doctor-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: doctor-db-secret
                  key: PGPASSWORD
          command: ["node", "seed-verified-doctor.js"]
      containers:
        - name: doctor-management-service
          image: docapp/doctor-management-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4002
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4002"
            - name: PGHOST
              value: "doctors-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: doctor-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: doctor-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: doctor-db-secret
                  key: PGPASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: doctor-db-secret
                  key: JWT_SECRET
            - name: AUTH_PUBLIC_KEY_PATH
              value: "/app/keys/auth-public.pem"
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: internal-api-secret
                  key: INTERNAL_API_KEY
            - name: PATIENT_SERVICE_URL
              value: "http://patient-management-service:6001"
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-api-secret
                  key: INTERNAL_SECRET
          volumeMounts:
            - name: auth-public-key
              mountPath: /app/keys
              readOnly: true
      volumes:
        - name: doctor-db-init
          configMap:
            name: doctor-db-init
            items:
              - key: init.sql
                path: init.sql
        - name: auth-public-key
          secret:
            secretName: auth-public-key
            items:
              - key: public.pem
                path: auth-public.pem

---
apiVersion: v1
kind: Service
metadata:
  name: doctor-management-service
spec:
  type: LoadBalancer
  selector:
    app: doctor-management-service
  ports:
    - protocol: TCP
      port: 4002
      targetPort: 4002
