apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: docapp/api-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4000"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:4001"
            - name: PATIENT_SERVICE_URL
              value: "http://patient-management-service:6001"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:6000"
            - name: DOCTOR_SERVICE_URL
              value: "http://doctor-management-service:4002"
            - name: APPOINTMENT_SERVICE_URL
              value: "http://appointment-service:4003"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:4006"
            - name: TELEMEDICINE_SERVICE_URL
              value: "http://telemedicine:4010"
            - name: SYMPTOM_CHECKER_SERVICE_URL
              value: "http://ai-symptom-checker-service:4009"
            # After PayHere returns to the public ngrok domain, bounce the browser back to
            # your local "main" app. If your local app is actually on 8081, change these to
            # http://localhost:8081/#/payments/return and http://localhost:8081/#/payments/cancel
            - name: PAYHERE_DEFAULT_RETURN_TO
              value: "http://localhost:8081/#/payments/return"
            - name: PAYHERE_DEFAULT_CANCEL_TO
              value: "http://localhost:8081/#/payments/cancel"
            # Safety: only allow redirecting to these hosts.
            - name: PAYHERE_RETURN_TO_ALLOWLIST
              value: "localhost,127.0.0.1"
            - name: LOG_LEVEL
              value: "info"

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
