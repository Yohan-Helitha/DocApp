apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      initContainers:
        - name: init-payment-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: "payment-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: payment-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: payment-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: PGPASSWORD
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for Postgres at ${PGHOST}:${PGPORT}..."
              until pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}"; do
                echo "Postgres not ready yet; retrying..."
                sleep 2
              done
              echo "Applying payment schema..."
              psql -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}" -f /db-init/init.sql
              echo "Payment schema applied."
          volumeMounts:
            - name: payment-db-init
              mountPath: /db-init
      containers:
        - name: payment-service
          image: docapp/payment-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4006
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4006"
            - name: PAYMENT_DATABASE_URL
              value: "postgresql://postgres:postgres@payment-postgres:5432/paymentdb"
            - name: PAYMENT_PGHOST
              value: "payment-postgres"
            - name: PAYMENT_PGPORT
              value: "5432"
            - name: PAYMENT_PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: payment-db-config
                  key: PGDATABASE
            - name: PAYMENT_PGUSER
              valueFrom:
                configMapKeyRef:
                  name: payment-db-config
                  key: PGUSER
            - name: PAYMENT_PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: PGPASSWORD
            - name: LOG_LEVEL
              value: "info"
            - name: PAYHERE_MERCHANT_ID
              valueFrom:
                secretKeyRef:
                  name: payhere-credentials
                  key: PAYHERE_MERCHANT_ID
            - name: PAYHERE_MERCHANT_SECRET
              valueFrom:
                secretKeyRef:
                  name: payhere-credentials
                  key: PAYHERE_MERCHANT_SECRET
            - name: PAYHERE_SANDBOX
              value: "true"
            - name: PAYHERE_RETURN_URL
              value: "https://docapp.ngrok.app/payhere/return"
            - name: PAYHERE_CANCEL_URL
              value: "https://docapp.ngrok.app/payhere/cancel"
            - name: PAYHERE_NOTIFY_URL
              value: "https://docapp.ngrok.app/api/v1/payments/notify"
            - name: APPOINTMENT_SERVICE_URL
              value: "http://appointment-service:4003"
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-api-secret
                  key: INTERNAL_SECRET
            - name: ADMIN_SERVICE_URL
              value: "http://admin-management-service:4008"
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: internal-api-secret
                  key: INTERNAL_API_KEY
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:6000"
            - name: CORS_ORIGIN
              value: "http://localhost:8081"

      volumes:
        - name: payment-db-init
          configMap:
            name: payment-db-init
            items:
              - key: init.sql
                path: init.sql
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  type: ClusterIP
  selector:
    app: payment-service
  ports:
    - protocol: TCP
      port: 4006
      targetPort: 4006
