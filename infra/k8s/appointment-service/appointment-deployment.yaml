apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  labels:
    app: appointment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      initContainers:
        - name: init-appointments-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: "appointments-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: appointment-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: appointment-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: appointment-db-secret
                  key: PGPASSWORD
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for Postgres at ${PGHOST}:${PGPORT}..."
              until pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}"; do
                echo "Postgres not ready yet; retrying..."
                sleep 2
              done
              echo "Applying appointments schema..."
              psql -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}" -f /db-init/init.sql
              echo "Appointments schema applied."
          volumeMounts:
            - name: appointment-db-init
              mountPath: /db-init
      containers:
        - name: appointment-service
          image: docapp/appointment-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4003
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4003"
            - name: PGHOST
              value: "appointments-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: appointment-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: appointment-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: appointment-db-secret
                  key: PGPASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: appointment-db-secret
                  key: JWT_SECRET
            - name: AUTH_PUBLIC_KEY_PATH
              value: "/keys/public.pem"
            - name: DOCTOR_SERVICE_URL
              value: "http://doctor-management-service:4002"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:6000"
          volumeMounts:
            - name: auth-public-key
              mountPath: /keys
              readOnly: true
      volumes:
        - name: appointment-db-init
          configMap:
            name: appointment-db-init
            items:
              - key: init.sql
                path: init.sql
        - name: auth-public-key
          secret:
            secretName: auth-public-key

---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
spec:
  type: LoadBalancer
  selector:
    app: appointment-service
  ports:
    - protocol: TCP
      port: 4003
      targetPort: 4003
