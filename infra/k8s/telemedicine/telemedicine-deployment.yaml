apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine
  labels:
    app: telemedicine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemedicine
  template:
    metadata:
      labels:
        app: telemedicine
    spec:
      initContainers:
        - name: init-telemedicine-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: "telemedicine-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: telemedicine-db-secret
                  key: PGPASSWORD
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for Postgres at ${PGHOST}:${PGPORT}..."
              until pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}"; do
                echo "Postgres not ready yet; retrying..."
                sleep 2
              done
              echo "Applying telemedicine schema..."
              psql -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}" -f /db-init/init.sql
              echo "Telemedicine schema applied."
          volumeMounts:
            - name: telemedicine-db-init
              mountPath: /db-init
      containers:
        - name: telemedicine
          image: docapp/telemedicine-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4010
          env:
            - name: NODE_ENV
              value: "production"
            - name: APP_TIMEZONE
              value: "Asia/Colombo"
            - name: PORT
              value: "4010"
            - name: PGHOST
              value: "telemedicine-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: telemedicine-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: telemedicine-db-secret
                  key: PGPASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: telemedicine-db-secret
                  key: JWT_SECRET
            - name: AUTH_PUBLIC_KEY_PATH
              value: "/keys/public.pem"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:6000"
          volumeMounts:
            - name: auth-public-key
              mountPath: /keys
              readOnly: true

      volumes:
        - name: telemedicine-db-init
          configMap:
            name: telemedicine-db-init
            items:
              - key: init.sql
                path: init.sql
        - name: auth-public-key
          secret:
            secretName: auth-public-key

---
apiVersion: v1
kind: Service
metadata:
  name: telemedicine
spec:
  selector:
    app: telemedicine
  ports:
    - protocol: TCP
      port: 4010
      targetPort: 4010
  type: ClusterIP
