apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: init-notification-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: "notification-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: notification-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: notification-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-db-secret
                  key: PGPASSWORD
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for Postgres at ${PGHOST}:${PGPORT}..."
              until pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}"; do
                echo "Postgres not ready yet; retrying..."
                sleep 2
              done
              echo "Applying notification schema..."
              psql -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}" -f /db-init/init.sql
              echo "Notification schema applied."
          volumeMounts:
            - name: notification-db-init
              mountPath: /db-init
      containers:
        - name: notification-service
          image: docapp/notification-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "6000"
            - name: TZ
              value: "Asia/Colombo"
            - name: PGHOST
              value: "notification-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: notification-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: notification-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-db-secret
                  key: PGPASSWORD
            - name: DB_HOST
              value: "notification-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: notification-db-config
                  key: PGDATABASE
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: notification-db-config
                  key: PGUSER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-db-secret
                  key: PGPASSWORD
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: notification-db-secret
                  key: RESEND_API_KEY
            - name: RESEND_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: notification-db-secret
                  key: RESEND_FROM_EMAIL
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: notification-db-secret
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: notification-db-secret
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: notification-db-secret
                  key: TWILIO_PHONE_NUMBER

      volumes:
        - name: notification-db-init
          configMap:
            name: notification-db-init
            items:
              - key: init.sql
                path: init.sql

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  type: LoadBalancer
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 6000
      targetPort: 6000
