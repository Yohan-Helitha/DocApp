apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: init-auth-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: "auth-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: auth-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: auth-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: PGPASSWORD
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for Postgres at ${PGHOST}:${PGPORT}..."
              until pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}"; do
                echo "Postgres not ready yet; retrying..."
                sleep 2
              done
              echo "Applying auth schema..."
              psql -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}" -f /db-init/init.sql
              echo "Auth schema applied."
          volumeMounts:
            - name: auth-db-init
              mountPath: /db-init
        - name: seed-auth-demo-users
          image: docapp/auth-service:local
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: "production"
            - name: PGHOST
              value: "auth-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: auth-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: auth-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: PGPASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: JWT_SECRET
          command: ["node", "seed-doctor.js"]
      containers:
        - name: auth-service
          image: docapp/auth-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4001"
            - name: PGHOST
              value: "auth-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: auth-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: auth-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: PGPASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: JWT_SECRET
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: internal-api-secret
                  key: INTERNAL_API_KEY
      volumes:
        - name: auth-db-init
          configMap:
            name: auth-db-init
            items:
              - key: init.sql
                path: init.sql

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 4001
      targetPort: 4001
