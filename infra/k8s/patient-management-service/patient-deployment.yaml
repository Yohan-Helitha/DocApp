apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-management-service
  labels:
    app: patient-management-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-management-service
  template:
    metadata:
      labels:
        app: patient-management-service
    spec:
      initContainers:
        - name: init-patient-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: "patient-postgres"
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                configMapKeyRef:
                  name: patient-db-config
                  key: PGDATABASE
            - name: PGUSER
              valueFrom:
                configMapKeyRef:
                  name: patient-db-config
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: patient-db-secret
                  key: PGPASSWORD
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for Postgres at ${PGHOST}:${PGPORT}..."
              until pg_isready -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}"; do
                echo "Postgres not ready yet; retrying..."
                sleep 2
              done
              echo "Applying patient schema..."
              psql -h "${PGHOST}" -p "${PGPORT}" -U "${PGUSER}" -d "${PGDATABASE}" -f /db-init/init.sql
              echo "Patient schema applied."
          volumeMounts:
            - name: patient-db-init
              mountPath: /db-init
      containers:
        - name: patient-management-service
          image: docapp/patient-management-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "6001"
            - name: DB_HOST
              value: "patient-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: patient-db-config
                  key: PGDATABASE
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: patient-db-config
                  key: PGUSER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: patient-db-secret
                  key: PGPASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: patient-db-secret
                  key: JWT_SECRET
            - name: AUTH_PUBLIC_KEY_PATH
              value: "/keys/public.pem"
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-api-secret
                  key: INTERNAL_SECRET
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:6000/api/v1/notifications"
            - name: CLOUDINARY_NAME
              valueFrom:
                secretKeyRef:
                  name: patient-cloudinary-secret
                  key: CLOUDINARY_NAME
            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: patient-cloudinary-secret
                  key: CLOUDINARY_API_KEY
            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: patient-cloudinary-secret
                  key: CLOUDINARY_API_SECRET
          volumeMounts:
            - name: auth-public-key
              mountPath: /keys
              readOnly: true

      volumes:
        - name: patient-db-init
          configMap:
            name: patient-db-init
            items:
              - key: init.sql
                path: init.sql
        - name: auth-public-key
          secret:
            secretName: auth-public-key

---
apiVersion: v1
kind: Service
metadata:
  name: patient-management-service
spec:
  type: LoadBalancer
  selector:
    app: patient-management-service
  ports:
    - protocol: TCP
      port: 6001
      targetPort: 6001
