apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-postgres
  labels:
    app: admin-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-postgres
  template:
    metadata:
      labels:
        app: admin-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: admin-db-config
                  key: PGUSER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: admin-db-config
                  key: PGDATABASE
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: admin-db-secret
                  key: PGPASSWORD
          volumeMounts:
            - name: admin-db-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: admin-db-init
          configMap:
            name: admin-db-init
            items:
              - key: init.sql
                path: init.sql
        - name: postgres-data
          persistentVolumeClaim:
            claimName: admin-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: admin-postgres
spec:
  selector:
    app: admin-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: admin-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
